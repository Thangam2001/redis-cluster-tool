- name: Ensure build dependencies are installed
  apt:
    name:
      - build-essential
      - tcl
      - wget
      - curl
    state: present
    update_cache: yes

- name: Ensure data and config directories exist
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /data/redis
    - /etc/redis

- name: Download Redis source tarball
  get_url:
    url: "https://download.redis.io/releases/redis-{{ redis_version }}.tar.gz"
    dest: "/tmp/redis-{{ redis_version }}.tar.gz"
    timeout: 120

- name: Extract Redis source
  unarchive:
    src: "/tmp/redis-{{ redis_version }}.tar.gz"
    dest: /tmp
    remote_src: yes

- name: Build Redis from source
  command: make -j2
  args:
    chdir: "/tmp/redis-{{ redis_version }}"
    creates: "/tmp/redis-{{ redis_version }}/src/redis-server"

- name: Install Redis binaries
  command: make install
  args:
    chdir: "/tmp/redis-{{ redis_version }}"

- name: Deploy redis.conf from template
  template:
    src: redis.conf.j2
    dest: /etc/redis/redis.conf
    mode: "0644"

- name: Start Redis server
  shell: |
    pkill redis-server || true
    sleep 1
    redis-server /etc/redis/redis.conf
  args:
    executable: /bin/bash

- name: Wait for Redis port to be ready
  wait_for:
    port: "{{ redis_port | default(6379) }}"
    timeout: 30
